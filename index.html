<!DOCTYPE html>
<html>
<head>
    <title>Image Recognition App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }
        .container {
            margin-top: 50px;
            padding: 20px;
            background: white;
            display: inline-block;
            border-radius: 10px;
        }
        input, button {
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Upload Image for Prediction</h2>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="image" required>
            <br>
            <button type="submit">Predict</button>
        </form>

        {% if label %}
            <h3>Prediction: {{ label }}</h3>
            <p>Confidence: {{ confidence }}</p>
        {% endif %}
    </div>
</body>
</html>
